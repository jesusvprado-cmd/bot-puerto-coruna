name: Monitoreo Portuario Nemo Pilots

on:
  # schedule:
  #   - cron: '*/30 * * * *'  # Desactivado: lo dispara cron-job.org
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager requests

    - name: Install Google Chrome (stable)
      run: |
        sudo apt-get update -q
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update -q
        sudo apt-get install -y google-chrome-stable
        google-chrome --version

    - name: Run Scraper
      env:
        TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NEMO_USER:        ${{ secrets.NEMO_USER }}
        NEMO_PASS:        ${{ secrets.NEMO_PASS }}
      run: python main.py

    - name: Upload Debug Screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: capturas-depuracion
        path: debug_final.png
        if-no-files-found: ignore

    - name: Commit and push history
      if: always()
      run: |
        git config --global user.name  "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add avisados_puerto.txt || true
        git commit -m "Auto-update historial [skip ci]" || echo "Sin cambios."
        git push || echo "Sin cambios que pushear."
