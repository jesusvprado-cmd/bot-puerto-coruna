name: Bot Puerto Coruña

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta automáticamente cada hora

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4

      - name: Ejecutar Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEMO_USER: ${{ secrets.NEMO_USER }}
          NEMO_PASS: ${{ secrets.NEMO_PASS }}
        run: python main.py

      - name: Guardar memoria (avisados.txt)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add avisados.txt || true
          git commit -m "Actualizar lista de barcos avisados" || true
          git push || true
