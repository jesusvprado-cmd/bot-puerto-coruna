name: Monitoreo Portuario Nemo Pilots

on:
  schedule:
    - cron: '*/30 * * * *' # Cada 30 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install selenium webdriver-manager requests

    - name: Install Google Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NEMO_USER: ${{ secrets.NEMO_USER }}
        NEMO_PASS: ${{ secrets.NEMO_PASS }}
      run: python main.py

    - name: Upload Debug Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: debug_final.png

    - name: Commit and push changes
      if: always()
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add avisados_puerto.txt || true
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto-update historial [skip ci]"
          git push
        else
          echo "Sin cambios en el historial."
        fi
